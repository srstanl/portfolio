name: dotnet-example-ci

on:
  pull_request:
    paths:
      - "examples/dotnet-service/**"
      - "templates/service-dotnet/**"
      - ".github/workflows/dotnet-example-ci.yml"
  push:
    branches: [ main ]
    paths:
      - "examples/dotnet-service/**"
      - "templates/service-dotnet/**"

jobs:
  dotnet-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore examples/dotnet-service/dotnet-service.sln

      - name: Verify formatting
        run: dotnet format --verify-no-changes examples/dotnet-service/dotnet-service.sln

      - name: Build with analyzers
        run: dotnet build examples/dotnet-service/dotnet-service.sln --configuration Release --no-restore -warnaserror

      - name: Test
        run: dotnet test examples/dotnet-service/dotnet-service.sln --configuration Release --no-build
