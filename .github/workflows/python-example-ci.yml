name: python-example-ci

on:
  workflow_dispatch:

  pull_request:
    paths:
      - "examples/python-service/**"
      - "templates/service-python/**"
      - ".github/workflows/python-example-ci.yml"
  push:
    branches: [ main ]
    paths:
      - "examples/python-service/**"
      - "templates/service-python/**"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r examples/python-service/requirements-dev.txt
          pip install pip-audit

      - name: Ruff lint
        run: ruff check examples/python-service

      - name: Ruff format
        run: ruff format --check examples/python-service

      - name: Test
        working-directory: examples/python-service
        run: PYTHONPATH=. pytest

      - name: Dependency scan (Python)
        run: pip-audit -r examples/python-service/requirements.txt

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@54c9adbab1582c2ef04b2016b760714a4bfde3cf
        with:
          dockerfile: examples/python-service/Dockerfile

      - name: Build container image
        run: docker build -t python-service:ci examples/python-service

      - name: Scan image (Trivy - CRITICAL)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          image-ref: python-service:ci
          format: table
          severity: CRITICAL
          exit-code: "1"
          ignore-unfixed: true
