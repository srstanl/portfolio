name: platform-ci

on:
  pull_request:
    paths:
      - "platform/**"
      - "idp/**"
      - "paved-roads/**"
      - "examples/**"
      - "templates/**"
      - "scripts/**"
      - ".github/workflows/**"
      - ".github/workflows/platform-ci.yml"
  push:
    branches: [ main ]
    paths:
      - "platform/**"
      - "idp/**"
      - "paved-roads/**"
      - "examples/**"
      - "templates/**"
      - "scripts/**"
      - ".github/workflows/**"

jobs:
  validate-platform-structure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate structure
        run: make validate-structure

      - name: Lint GitHub Actions workflows
        uses: rhysd/actionlint@v1

      - name: Secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Repo hygiene checks
        run: ./scripts/ci/check-repo-hygiene.sh

      - name: Lint Dockerfiles
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: |
            examples/dotnet-service/Dockerfile
            examples/python-service/Dockerfile
            examples/node-service/Dockerfile
