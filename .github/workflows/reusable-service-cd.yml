name: reusable-service-cd

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
      image_name:
        required: true
        type: string
      build_context:
        required: true
        type: string
      kustomize_path:
        required: true
        type: string
      deployment_name:
        required: true
        type: string
      health_endpoint:
        required: false
        type: string
        default: "/health"
      integration_endpoint:
        required: false
        type: string
        default: ""
      target_environment:
        required: true
        type: string
      namespace:
        required: true
        type: string
      environment_name:
        required: true
        type: string
      dev_runner_labels_json:
        required: false
        type: string
        default: '["self-hosted","macOS","k3d-local"]'
      remote_runner_labels_json:
        required: false
        type: string
        default: '["ubuntu-latest"]'
    secrets:
      KUBECONFIG_B64:
        required: false

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.service_name }}-${{ inputs.target_environment }}
  cancel-in-progress: false

jobs:
  build-and-push:
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-latest
    outputs:
      image_ref: ${{ steps.meta.outputs.image_ref }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set image metadata
        id: meta
        run: |
          IMAGE_TAG=${GITHUB_SHA}
          IMAGE_REF=${{ inputs.image_name }}:${IMAGE_TAG}
          echo "image_ref=${IMAGE_REF}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.build_context }}
          push: true
          tags: |
            ${{ steps.meta.outputs.image_ref }}
            ${{ inputs.image_name }}:latest

  deploy:
    needs: build-and-push
    runs-on: ${{ inputs.target_environment == 'dev' && fromJSON(inputs.dev_runner_labels_json) || fromJSON(inputs.remote_runner_labels_json) }}
    environment: ${{ inputs.environment_name }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.31.0

      - name: Configure kubeconfig (non-dev)
        if: ${{ inputs.target_environment != 'dev' }}
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBECONFIG_B64 }}" | base64 --decode > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Ensure namespace
        run: kubectl create namespace "${{ inputs.namespace }}" --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply manifests
        run: kubectl -n "${{ inputs.namespace }}" apply -k "${{ inputs.kustomize_path }}"

      - name: Update image
        run: |
          kubectl -n "${{ inputs.namespace }}" set image deployment/${{ inputs.deployment_name }} \
            ${{ inputs.deployment_name }}=${{ needs.build-and-push.outputs.image_ref }}

      - name: Verify rollout [Blocking]
        run: kubectl -n "${{ inputs.namespace }}" rollout status deployment/${{ inputs.deployment_name }} --timeout=120s

      - name: Verify health endpoint [Blocking]
        run: |
          kubectl -n "${{ inputs.namespace }}" run curl-health --rm -i --restart=Never --image=curlimages/curl:8.8.0 \
            -- curl -fsS http://${{ inputs.deployment_name }}:8080${{ inputs.health_endpoint }}

      - name: Integration test gate (dev only) [Blocking]
        if: ${{ inputs.target_environment == 'dev' && inputs.integration_endpoint != '' }}
        run: |
          kubectl -n "${{ inputs.namespace }}" run curl-integration --rm -i --restart=Never --image=curlimages/curl:8.8.0 \
            -- curl -fsS http://${{ inputs.deployment_name }}:8080${{ inputs.integration_endpoint }}
