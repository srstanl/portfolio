name: python-cd

on:
  workflow_dispatch:
    inputs:
      target_environment:
        description: "Deployment target"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - staging
          - prod

permissions:
  contents: read

jobs:
  python-service-cd:
    if: ${{ github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' }}
    uses: ./.github/workflows/reusable-service-cd.yml
    with:
      service_name: python-service
      image_name: ghcr.io/${{ github.repository_owner }}/python-service
      build_context: examples/python-service
      kustomize_path: platform/cd/python-service/base
      deployment_name: python-service
      health_endpoint: /health
      integration_endpoint: /docs
      target_environment: ${{ inputs.target_environment }}
      namespace: ${{ inputs.target_environment == 'prod' && 'apps-prod' || (inputs.target_environment == 'staging' && 'apps-staging' || 'apps-dev') }}
      environment_name: ${{ inputs.target_environment == 'prod' && 'python-prod' || (inputs.target_environment == 'staging' && 'python-staging' || 'python-dev') }}
    secrets:
      KUBECONFIG_B64: ${{ secrets.KUBECONFIG_B64 }}
